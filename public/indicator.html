<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>语音输入状态</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
      body { display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .indicator { min-width: 190px; height: 44px; padding: 0 16px; display: flex; align-items: center; justify-content: center; gap: 10px; color: #fff; background: rgba(28, 28, 32, 0.94); border: 1px solid rgba(255,255,255,.12); border-radius: 12px; box-shadow: 0 8px 28px rgba(0,0,0,.35); }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: #ff4757; animation: pulse 1.2s ease-in-out infinite; }
      .label { font-size: 14px; font-weight: 600; white-space: nowrap; }
      .indicator[data-status="transcribing"] .dot,
      .indicator[data-status="refining"] .dot,
      .indicator[data-status="delivering"] .dot { background: #60a5fa; }
      .indicator[data-status="completed"] .dot { background: #34d399; animation: none; }
      .indicator[data-status="failed"] .dot { background: #fb7185; animation: none; }
      @keyframes pulse { 50% { transform: scale(1.45); opacity: .6; } }
    </style>
  </head>
  <body>
    <div id="indicator" class="indicator" data-status="recording">
      <span class="dot" aria-hidden="true"></span>
      <span id="label" class="label">正在录音</span>
    </div>
    <script>
      const labels = {
        recording: "正在录音",
        transcribing: "正在识别",
        refining: "正在整理",
        delivering: "正在输入",
        completed: "输入完成",
        failed: "处理失败",
      };
      window.setIndicatorStatus = (status) => {
        const indicator = document.getElementById("indicator");
        const label = document.getElementById("label");
        if (!indicator || !label || !labels[status]) return;
        indicator.dataset.status = status;
        label.textContent = labels[status];
      };
    </script>
  </body>
</html>
