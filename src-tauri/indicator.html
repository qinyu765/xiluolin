<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>录音中</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        background: transparent;
      }

      body {
        width: 100vw;
        height: 100vh;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
      }

      .indicator {
        background: rgba(30, 30, 35, 0.95);
        border-radius: 10px;
        padding: 10px 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        display: inline-flex;
        align-items: center;
        gap: 10px;
        animation: slideIn 0.3s ease-out;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: fit-content;
      }

      @keyframes slideIn {
        from {
          transform: translateY(-20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .pulse {
        width: 8px;
        height: 8px;
        background: #ff4757;
        border-radius: 50%;
        animation: pulse 1.5s ease-in-out infinite;
        flex-shrink: 0;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.3);
          opacity: 0.7;
        }
      }

      .text {
        color: white;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.3px;
        white-space: nowrap;
      }

      .waveform {
        display: flex;
        align-items: center;
        gap: 2px;
        height: 16px;
      }

      .bar {
        width: 2px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 1.5px;
        animation: wave 1s ease-in-out infinite;
      }

      .bar:nth-child(1) {
        animation-delay: 0s;
      }
      .bar:nth-child(2) {
        animation-delay: 0.1s;
      }
      .bar:nth-child(3) {
        animation-delay: 0.2s;
      }
      .bar:nth-child(4) {
        animation-delay: 0.3s;
      }

      @keyframes wave {
        0%,
        100% {
          height: 5px;
        }
        50% {
          height: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="indicator">
      <div class="pulse"></div>
      <div class="text">录音中</div>
      <div class="waveform">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
  </body>
</html>
